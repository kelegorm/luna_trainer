name: luna_traineer
description: "Luna Trainer — personal LinkedIn Tango trainer with per-heuristic mastery."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5

  # Persistence
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  path_provider: ^2.1.4

  # Domain libs
  fsrs: ^2.0.0
  sensors_plus: ^6.0.0

  # Charts
  fl_chart: ^0.69.0

  # Codegen-side annotations
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Codegen
  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0

  # Test utilities
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

  # Lints
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
